name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, without the leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: davidB/rust-cargo-make@v1

      - name: Run CI checks
        run: cargo make ci

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read release version
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          version="${VERSION}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version ${version} is not a supported semver release version" >&2
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install cargo-release
        run: cargo install cargo-release --locked

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, tag, and push
        run: >-
          cargo release "${{ steps.version.outputs.version }}"
          --workspace
          --execute
          --no-confirm
          --no-publish
          --no-verify
          --tag-name "${{ steps.version.outputs.tag }}"
          --allow-branch main

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

  build-assets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs:
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: git-cascade-x86_64-unknown-linux-musl.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: git-cascade-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: git-cascade-aarch64-apple-darwin.tar.gz
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build -p git-cascade --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          python <<'PY'
          import os
          import tarfile
          from pathlib import Path

          target = os.environ["TARGET"]
          asset = os.environ["ASSET"]
          binary_name = "git-cascade"
          binary = Path("target") / target / "release" / binary_name

          with tarfile.open(asset, "w:gz") as archive:
              archive.add(binary, arcname=binary_name)
          PY

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: ${{ matrix.asset }}
